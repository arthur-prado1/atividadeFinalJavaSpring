<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/produtos">FATEC - Catalogo</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow mx-auto" style="max-width: 500px;">
        <div class="card-header bg-white">
            <h2 class="mb-0" th:text="${produto.idProduto == 0 ? 'Novo Produto' : 'Editar Produto'}"></h2>
        </div>
        <div class="card-body">
            <form th:action="@{/produtos/salvar}" th:object="${produto}" method="post" id="produtoForm">
                <input type="hidden" th:field="*{idProduto}">

                <div class="mb-3">
                    <label class="form-label">Nome do Produto</label>
                    <input type="text" th:field="*{nome}"
                           th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid' : ''"
                           class="form-control">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Valor (R$)</label>
                    <input type="text" id="valorMascara" class="form-control" inputmode="decimal">
                    <input type="hidden" th:field="*{valor}" id="valorReal">
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('valor')}" th:errors="*{valor}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantidade em Estoque</label>
                    <input type="number" th:field="*{quantidade}"
                           th:classappend="${#fields.hasErrors('quantidade')} ? 'is-invalid' : ''"
                           class="form-control">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('quantidade')}" th:errors="*{quantidade}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Categoria</label>
                    <select th:field="*{categoria}" class="form-select" required>
                        <option value="" disabled selected>Selecione uma categoria...</option>
                        <option th:each="cat : ${categorias}"
                                th:value="${cat.idCategoria}"
                                th:text="${cat.nome}"></option>
                    </select>
                    <div class="text-danger" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">Salvar Produto</button>
                    <a th:href="@{/produtos}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const maskInput = document.getElementById('valorMascara');
    const hiddenInput = document.getElementById('valorReal');
    const form = document.getElementById('produtoForm');

    function formatBR(value) {
        return Number(value || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function normalizeToDecimal(value) {
        return value.replace(/\./g, '').replace(',', '.');
    }

    if (hiddenInput.value) {
        maskInput.value = formatBR(hiddenInput.value);
    }

    maskInput.addEventListener('input', () => {
        let onlyNumbers = maskInput.value.replace(/\D/g, '');
        if (!onlyNumbers) onlyNumbers = '0';
        const decimal = (parseInt(onlyNumbers, 10) / 100).toFixed(2);
        maskInput.value = formatBR(decimal);
        hiddenInput.value = decimal;
    });

    form.addEventListener('submit', () => {
        if (maskInput.value && !hiddenInput.value) {
            hiddenInput.value = normalizeToDecimal(maskInput.value);
        }
    });
</script>
</body>
</html>
