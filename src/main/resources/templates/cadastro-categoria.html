<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Categoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 700px;">
        <div class="card-header bg-dark text-white">
            <h3 class="mb-0">Cadastro e Listagem de Categorias</h3>
        </div>
        <div class="card-body">
            <div th:if="${mensagemSucesso}" class="alert alert-success" th:text="${mensagemSucesso}"></div>

            <form th:action="@{/categorias/salvar}" th:object="${categoria}" method="post" class="mb-4">
                <div class="mb-3">
                    <label class="form-label">Nome da Categoria</label>
                    <input type="text" th:field="*{nome}" class="form-control"
                           placeholder="Ex: Informatica, Papelaria..." required>
                    <div class="text-danger" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="/produtos" class="btn btn-secondary">Voltar</a>
                    <button type="submit" class="btn btn-primary">Salvar Categoria</button>
                </div>
            </form>

            <h5 class="mb-3">Categorias ja cadastradas</h5>
            <table class="table table-striped">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cat : ${categorias}">
                    <td th:text="${cat.idCategoria}"></td>
                    <td th:text="${cat.nome}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
