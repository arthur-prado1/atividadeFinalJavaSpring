<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhe da Auditoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container d-flex justify-content-between">
        <a class="navbar-brand" href="/produtos">FATEC Catalogo</a>
        <a class="btn btn-light btn-sm" th:href="@{/produtos/historico}">Voltar ao historico</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow mb-4">
        <div class="card-header bg-white">
            <h4 class="mb-0">Detalhes da alteracao</h4>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <strong>ID Auditoria:</strong> <span th:text="${log.idAuditoria}"></span><br>
                <strong>ID Produto:</strong> <span th:text="${log.idProduto}"></span><br>
                <strong>Acao:</strong> <span th:text="${log.acao}"></span><br>
                <strong>Usuario:</strong> <span th:text="${log.usuarioAcao != null ? log.usuarioAcao : '-'}"></span><br>
                <strong>Data/Hora:</strong> <span th:text="${log.dataEvento != null ? #temporals.format(log.dataEvento, 'dd/MM/yyyy HH:mm:ss') : '-'}"></span>
            </div>

            <div class="row g-3">
                <div class="col-md-6">
                    <div class="card h-100 border-secondary">
                        <div class="card-header">Antes</div>
                        <div class="card-body">
                            <p><strong>Nome:</strong> <span th:text="${log.nomeAntes != null ? log.nomeAntes : '-'}"></span></p>
                            <p><strong>Valor:</strong>
                                <span th:text="${log.valorAntes != null ? #numbers.formatDecimal(log.valorAntes, 1, 'POINT', 2, 'COMMA') : '-'}"></span>
                            </p>
                            <p><strong>Quantidade:</strong> <span th:text="${log.quantidadeAntes != null ? log.quantidadeAntes : '-'}"></span></p>
                            <p><strong>Categoria:</strong> <span th:text="${log.categoriaAntes != null ? log.categoriaAntes : '-'}"></span></p>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card h-100 border-primary">
                        <div class="card-header">Depois</div>
                        <div class="card-body">
                            <p><strong>Nome:</strong> <span th:text="${log.nomeDepois != null ? log.nomeDepois : '-'}"></span></p>
                            <p><strong>Valor:</strong>
                                <span th:text="${log.valorDepois != null ? #numbers.formatDecimal(log.valorDepois, 1, 'POINT', 2, 'COMMA') : '-'}"></span>
                            </p>
                            <p><strong>Quantidade:</strong> <span th:text="${log.quantidadeDepois != null ? log.quantidadeDepois : '-'}"></span></p>
                            <p><strong>Categoria:</strong> <span th:text="${log.categoriaDepois != null ? log.categoriaDepois : '-'}"></span></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="alert alert-info mt-3 mb-0" th:if="${log.acao != 'UPDATE'}">
                Para eventos CREATE/DELETE, pode haver somente um dos lados preenchido.
            </div>
        </div>
    </div>
</div>
</body>
</html>
