<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/produtos">FATEC Catalogo</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/produtos}">Produtos</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/produtos/historico}">Historico</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/categorias/novo}">Categoria</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/usuarios/novo}">Novo usuario</a>
                </li>
            </ul>

            <div class="d-flex align-items-center">
                <span class="navbar-text text-white me-3" sec:authorize="isAuthenticated()">
                    Ola, <strong sec:authentication="name">Usuario</strong>
                </span>

                <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                    <button type="submit" class="btn btn-light btn-sm text-primary fw-bold">Sair</button>
                </form>

                <a class="btn btn-light btn-sm" th:href="@{/login}" sec:authorize="!isAuthenticated()">
                    Entrar
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card shadow">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Lista de Produtos</h2>
            <a href="/produtos/novo" class="btn btn-success" sec:authorize="hasRole('ADMIN')">Novo Produto</a>
        </div>
        <div class="card-body">

            <div th:if="${mensagemSucesso}" class="alert alert-success" th:text="${mensagemSucesso}"></div>

            <form th:action="@{/produtos}" method="get" class="mb-4">
                <div class="row g-2">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" name="nome" class="form-control"
                                   placeholder="Buscar produto por nome..."
                                   th:value="${param.nome}">
                        </div>
                    </div>

                    <div class="col-md-4">
                        <select name="categoriaId" class="form-select">
                            <option value="">Todas as Categorias</option>
                            <option th:each="cat : ${categorias}"
                                    th:value="${cat.idCategoria}"
                                    th:text="${cat.nome}"
                                    th:selected="${#strings.equals(param.categoriaId, #strings.toString(cat.idCategoria))}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" type="submit">Filtrar</button>
                    </div>
                </div>
            </form>

            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Categoria</th>
                    <th>Preco (R$)</th>
                    <th>Estoque</th>
                    <th class="text-center" sec:authorize="hasRole('ADMIN')">Acoes</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${produtos}">
                    <td th:text="${p.idProduto}"></td>
                    <td th:text="${p.nome}"></td>
                    <td th:text="${p.categoria != null ? p.categoria.nome : 'Sem Categoria'}"></td>
                    <td th:text="${#numbers.formatDecimal(p.valor, 1, 'POINT', 2, 'COMMA')}"></td>
                    <td th:text="${p.quantidade}"></td>
                    <td class="text-center" sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/produtos/editar/{id}(id=${p.idProduto})}" class="btn btn-sm btn-warning">Editar</a>
                        <button type="button" class="btn btn-sm btn-danger btn-excluir"
                                data-bs-toggle="modal" data-bs-target="#confirmDeleteModal"
                                th:attr="data-id=${p.idProduto},data-nome=${p.nome}">Excluir</button>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(produtos)}" class="alert alert-info text-center">
                Nenhum produto encontrado para os filtros selecionados.
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirmar exclusao</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <div class="modal-body">
                Deseja realmente excluir o produto <strong id="produtoNome"></strong>?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <a id="confirmDeleteBtn" href="#" class="btn btn-danger">Excluir</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const modal = document.getElementById('confirmDeleteModal');
    const produtoNome = document.getElementById('produtoNome');
    const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

    modal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;
        const id = button.getAttribute('data-id');
        const nome = button.getAttribute('data-nome');

        produtoNome.textContent = nome;
        confirmDeleteBtn.setAttribute('href', '/produtos/excluir/' + id);
    });
</script>
</body>
</html>
